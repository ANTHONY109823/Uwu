<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UWU 🧸 — Panel de administrador</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--pink-500:#EE7EB1;--rose-500:#E8447A;--night:#1C1420;--grad:linear-gradient(135deg,#EE7EB1,#E8447A 60%,#C2418F)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100svh;font-family:Inter,system-ui,sans-serif;background:linear-gradient(160deg,#1C1420,#2A1E2E 50%,#3d1a30);color:#fff;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:420px;width:100%;background:rgba(255,255,255,.06);backdrop-filter:blur(18px);border:1px solid rgba(238,126,177,.25);border-radius:28px;padding:40px 32px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
    .logo{font-family:Sora,sans-serif;font-size:28px;font-weight:800;text-align:center;margin-bottom:8px}
    .logo span{color:var(--pink-500)}
    .sub{text-align:center;font-size:13px;color:#a58a99;margin-bottom:28px;line-height:1.6}
    label{display:block;font-size:12px;font-weight:600;color:#cbb3c0;margin-bottom:6px;letter-spacing:.04em}
    input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.25);color:#fff;font-size:15px;margin-bottom:18px}
    input:focus{outline:2px solid var(--rose-500);border-color:transparent}
    .btn{width:100%;padding:15px;border-radius:999px;border:none;background:var(--grad);color:#fff;font-family:Sora,sans-serif;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 12px 34px rgba(232,68,122,.4);transition:transform .2s}
    .btn:hover{transform:translateY(-2px)}
    .err{display:none;margin-top:14px;padding:12px;border-radius:12px;background:rgba(232,68,122,.2);border:1px solid rgba(232,68,122,.4);font-size:13px;text-align:center;color:#ffb4c8}
    .hint{margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:11.5px;color:#8a7080;line-height:1.65}
    .hint b{color:#cbb3c0}
    a.back{display:block;text-align:center;margin-top:20px;font-size:12px;color:#a58a99;text-decoration:none}
    a.back:hover{color:var(--pink-500)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Uwu <span>🧸</span> Admin</div>
    <p class="sub">Acceso exclusivo para administradores.<br />No está enlazado desde la web pública.</p>
    <form id="loginForm">
      <label for="pw">Contraseña</label>
      <input id="pw" type="password" placeholder="Tu contraseña de administrador" autocomplete="current-password" required />
      <button class="btn" type="submit">🔑 Ingresar al editor</button>
    </form>
    <div class="err" id="err">Contraseña incorrecta 🙈</div>
    <div class="hint">
      <b>¿Qué puedes hacer?</b><br />
      Editar textos de la landing, ocultar secciones, reordenar bloques y descargar el <code>index.html</code> actualizado para publicarlo en GitHub.
    </div>
    <a class="back" href="index.html">← Volver a la web pública</a>
  </div>
  <script>
    var ADMIN_HASH='e7956c9d534573c0ace68d7119ccec6458af1c8ec3e5292e74b0aaad95d4edee';
    if(sessionStorage.getItem('uwuAdm')==='1'){location.replace('index.html');}
    document.getElementById('loginForm').addEventListener('submit',function(e){
      e.preventDefault();
      var pw=document.getElementById('pw').value;
      crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw)).then(function(b){
        var h=Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');
        if(h===ADMIN_HASH){sessionStorage.setItem('uwuAdm','1');location.href='index.html';}
        else{document.getElementById('err').style.display='block';}
      });
    });
  </script>
</body>
</html>
