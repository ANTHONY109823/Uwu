  <script type="x-shader/x-vertex" id="shader-passthrough-vertex">
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  </script>

  <script type="x-shader/x-fragment" id="shader-passthrough-fragment">
    uniform sampler2D tDiffuse;
    varying vec2 vUv;
    void main() { gl_FragColor = texture2D(tDiffuse, vec2(vUv.x, vUv.y)); }
  </script>

  <script type="x-shader/x-fragment" id="shader-volumetric-light-fragment">
    varying vec2 vUv;
    uniform sampler2D tDiffuse;
    uniform vec2 lightPosition;
    uniform float exposure;
    uniform float decay;
    uniform float density;
    uniform float weight;
    uniform int samples;
    const int MAX_SAMPLES = 100;
    void main() {
      vec2 texCoord = vUv;
      vec2 deltaTextCoord = texCoord - lightPosition;
      deltaTextCoord *= 1.0 / float(samples) * density;
      vec4 color = texture2D(tDiffuse, texCoord);
      float illuminationDecay = 1.0;
      for(int i=0; i < MAX_SAMPLES; i++) {
        if(i == samples) break;
        texCoord -= deltaTextCoord;
        vec4 sample = texture2D(tDiffuse, texCoord);
        sample *= illuminationDecay * weight;
        color += sample;
        illuminationDecay *= decay;
      }
      gl_FragColor = color * exposure;
    }
  </script>

  <script type="x-shader/x-fragment" id="shader-additive-fragment">
    uniform sampler2D tDiffuse;
    uniform sampler2D tAdd;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      vec4 add   = texture2D(tAdd, vUv);
      gl_FragColor = color + add;
    }
  </script>

  <script>
const CUBE_SIZE = 10, MAP_WIDTH = 28, MAP_HEIGHT = 31;
const NONE=0,UP=1,RIGHT=2,DOWN=3,LEFT=4;
const MAP_EMPTY=1,MAP_WALL=2,MAP_JUNCTION=3,MAP_DIRECTION=4;
const MAP_PARSE_COLORS={'0,0,0':MAP_EMPTY,'255,0,0':MAP_WALL,'0,255,0':MAP_JUNCTION,'0,0,255':MAP_DIRECTION};

const Utils = {
  AddDot(scene,position,size=5){
    const geo=new THREE.Geometry(); geo.vertices.push(position.clone());
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size,sizeAttenuation:false,color:0xffffff})));
  }
};

class BoardMap {
  constructor(mapId){this.width=0;this.height=0;this.tiles=[];this.mapImageData=this.getImageData(mapId);this.parseMap();}
  getImageData(id){const c=document.createElement('canvas'),g=c.getContext('2d'),img=document.querySelector(id);const{width:w,height:h}=img;c.width=w;c.height=h;g.drawImage(img,0,0);this.width=w;this.height=h;return g.getImageData(0,0,w,h).data;}
  getMapPixelRGB(x,y){const{mapImageData:d,width}=this,idx=(x+width*y)*4;return[Math.round(d[idx]/255)*255,Math.round(d[idx+1]/255)*255,Math.round(d[idx+2]/255)*255];}
  stepToDirection(x,y,dir){let xT=x,yT=y;if(dir===UP)yT--;else if(dir===RIGHT)xT++;else if(dir===DOWN)yT++;else if(dir===LEFT)xT--;return[xT,yT];}
  getTileAt(x,y,dir=NONE){let[xT,yT]=this.stepToDirection(x,y,dir);if(x<=this.width&&y<=this.height)return this.tiles[yT*this.width+xT];}
  getNearestNeighborFrom(x,y,dir,type){let next=this.getTileAt(x,y,dir),[xT,yT]=this.stepToDirection(x,y,dir);if(next===type)return[xT,yT];else if(next)return this.getNearestNeighborFrom(xT,yT,dir,type);}
  getIndexFromCoords(x,y){return y*this.width+x;}
  getCoordsFromIndex(idx){return[idx%this.width,Math.floor(idx/this.width)];}
  parseMap(){for(let y=0;y<this.height;y++)for(let x=0;x<this.width;x++){const[r,g,b]=this.getMapPixelRGB(x,y);this.tiles.push(MAP_PARSE_COLORS[`${r},${g},${b}`]);}}
}

class MapBoundariesMesh {
  constructor(bm){this.boardMap=bm;this.geometry=new THREE.Geometry();this.generateGeometry();}
  generateGeometry(){for(let x=0;x<MAP_WIDTH;x++)for(let y=0;y<MAP_HEIGHT;y++)if(this.boardMap.tiles[y*MAP_WIDTH+x]===MAP_WALL)this.putBlock(x,y);}
  putBlock(x,y){const bW=CUBE_SIZE/MAP_WIDTH,bH=CUBE_SIZE/MAP_HEIGHT,h=CUBE_SIZE/2,e=0.25,geo=new THREE.BoxGeometry(bW,e,bH);geo.translate(-h+x*bW+bW/2,e/2,-h+y*bH+bH/2);const m=new THREE.Mesh(geo);this.geometry.merge(m.geometry,m.matrix);}
}

class Particles {
  constructor(){this.clusters=[];this.scales=[];this.initParticles();}
  initParticles(){this.texture=new THREE.TextureLoader().load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/204379/particle.png');for(let i=0;i<5;i++)this.clusters.push({scale:i+2,speed:THREE.Math.randFloat(0.5,1.8),points:this.getCluster(100)});}
  getCluster(count){const geo=new THREE.Geometry(),mat=new THREE.PointsMaterial({color:0xffff00,size:THREE.Math.randFloat(0.1,0.25),map:this.texture,sizeAttenuation:true,transparent:true,opacity:0.9});for(let i=0;i<count;i++){let p=new THREE.Vector3();p.x=THREE.Math.randFloatSpread(2);p.y=THREE.Math.randFloatSpread(2);p.z=THREE.Math.randFloatSpread(2);geo.vertices.push(p);}return new THREE.Points(geo,mat);}
  update(delta){for(let i=0;i<this.clusters.length;i++){const c=this.clusters[i];if(c.scale>12){c.scale=2;c.points.material.opacity=1;}c.scale+=0.45*delta*c.speed;c.points.scale.set(c.scale,c.scale,c.scale);if(c.scale>8)c.points.material.opacity=THREE.Math.lerp(1,0,1-(12-c.scale)/4);}}
}

class Trails {
  constructor(map){this.group=new THREE.Object3D();this.position=new THREE.Vector3();this.map=map;this.maxPositions=25;this.history=[];this.junctionTiles=[];this.init();this.spawn();}
  init(){this.geometry=new THREE.Geometry();const mat=new MeshLineMaterial({color:new THREE.Color(0xffffff),side:THREE.DoubleSide});this.line=new MeshLine();this.mesh=new THREE.Mesh(this.line.geometry,mat);this.group.add(this.mesh);for(let i=0;i<this.maxPositions;i++)this.geometry.vertices.push(new THREE.Vector3());this.map.tiles.forEach((t,idx)=>{if(t===MAP_JUNCTION)this.junctionTiles.push(idx);});this.light=new THREE.PointLight(0x00ff00,1,5);this.group.add(this.light);}
  spawn(){const{position,line}=this,{vertices}=this.geometry,wp=this.getWayPoints();vertices.forEach(v=>v.copy(wp[0]));this.position.copy(wp[0]);this.light.position.copy(wp[0]);line.setGeometry(this.geometry,p=>p*0.5);this.startPath(wp);}
  getTileDirections(x,y){return[UP,RIGHT,DOWN,LEFT].filter(d=>{const t=this.map.getTileAt(x,y,d);return t!==undefined&&t===MAP_DIRECTION;});}
  scaleTilePosition(pos){const{map}=this,sX=CUBE_SIZE/map.width,sY=CUBE_SIZE/map.height;pos.set((pos.x+sX*1.5)*sX,(pos.y+sX*1.5)*sY,0);return pos;}
  getWayPoints(){const{map,junctionTiles:jT}=this,st=jT[~~(Math.random()*jT.length)];let[xC,yC]=map.getCoordsFromIndex(st);const vis=[];let ins=true;while(ins){vis.push(map.getIndexFromCoords(xC,yC));const dirs=this.getTileDirections(xC,yC),nb=dirs.map(d=>map.getNearestNeighborFrom(xC,yC,d,MAP_JUNCTION)).filter(n=>vis.indexOf(map.getIndexFromCoords(n[0],n[1]))===-1),nP=nb[~~(Math.random()*nb.length)];if(nP){[xC,yC]=nP;}else{ins=false;}}return vis.map(idx=>{let[x,y]=map.getCoordsFromIndex(idx);return this.scaleTilePosition(new THREE.Vector3(x,y,0));});}
  updatePosition(){this.light.position.copy(this.position);this.line.advance(this.position);}
  startPath(wp){this.timeline=new TimelineMax({onComplete:()=>{TweenMax.to(this.position,1,{onUpdate:this.updatePosition.bind(this),onComplete:()=>{setTimeout(this.spawn.bind(this),Math.random()*2500+500);}});}});wp.forEach((pos,idx)=>{this.timeline.to(this.position,0.25,{x:pos.x,y:pos.y,onUpdate:this.updatePosition.bind(this),ease:Linear.easeNone});if(idx===0)this.timeline.to(this.light,0.2,{power:1.5*4*Math.PI});if(idx===wp.length-1)this.timeline.to(this.light,0.4,{power:0.1*4*Math.PI},'-=0.45');});}
}

class App {
  constructor(){this.width=0;this.height=0;this.mouse=new THREE.Vector2(0,0);this.init();this.initLights();this.initMazeMesh();this.initTrails();this.initParticles();this.initGodRays();this.setupComposer();this.setupProstprocessing();this.addRenderTargetImage();this.attachEvents();this.updateSize();this.onFrame(0);}
  init(){const{innerWidth:w,innerHeight:h}=window;this.renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});this.renderer.setPixelRatio(window.devicePixelRatio);this.renderer.setSize(w,h);this.renderer.gammaInput=true;this.scene=new THREE.Scene();this.camera=new THREE.PerspectiveCamera(45,w/h,0.1,1000);this.camera.position.set(14,14,14);this.clock=new THREE.Clock();document.body.appendChild(this.renderer.domElement);}
  initTrails(){const{scene}=this,map=new BoardMap('#map-test'),t1=new Trails(map),t2=new Trails(map),t3=new Trails(map);t1.group.position.set(-CUBE_SIZE/2,CUBE_SIZE/2+0.2,-CUBE_SIZE/2);t1.group.rotation.x=Math.PI/2;scene.add(t1.group);t2.group.position.set(CUBE_SIZE/2,-CUBE_SIZE/2,-CUBE_SIZE/2);t2.group.rotation.x=Math.PI/2;t2.group.rotation.y=Math.PI/2;scene.add(t2.group);t3.group.position.set(-CUBE_SIZE/2,-CUBE_SIZE/2-0.1,CUBE_SIZE/2);scene.add(t3.group);}
  initParticles(){this.particles=new Particles();this.particles.clusters.forEach(c=>this.scene.add(c.points));}
  initLights(){const{scene}=this,al=new THREE.AmbientLight(0xffffff,0.15),il=new THREE.PointLight(0xfffff),ol=new THREE.PointLight(0xc743ff,3,25);ol.position.set(14,14,14);this.outterLight=ol;scene.add(il);scene.add(ol);scene.add(al);}
  setupProstprocessing(){const{composer}=this,{innerWidth:w,innerHeight:h}=window;this.effectFXAA=new THREE.ShaderPass(THREE.FXAAShader);this.effectFXAA.uniforms['resolution'].value.set(1/w,1/h);composer.addPass(this.effectFXAA);this.bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(w,h),1.5,0.4,0.85);this.bloomPass.renderToScreen=true;composer.addPass(this.bloomPass);}
  initGodRays(){const{scene,mazeMesh}=this,gs=new THREE.BoxGeometry(CUBE_SIZE*.8,CUBE_SIZE*.8,CUBE_SIZE*.8),ms=new THREE.MeshBasicMaterial({color:0xffa602,transparent:true});this.lightSphere=new THREE.Mesh(gs,ms);this.lightSphere.layers.set(1);this.lightSphere.material.opacity=1;scene.add(this.lightSphere);const mo=new THREE.MeshBasicMaterial({color:0x0});this.occlusionMesh=new THREE.Mesh(mazeMesh.geometry,mo);this.occlusionMesh.position.z=0;this.occlusionMesh.layers.set(1);scene.add(this.occlusionMesh);}
  getScriptContent(id){return document.querySelector(id).textContent;}
  setupComposer(){const{renderer,camera,scene}=this,{innerWidth:w,innerHeight:h}=window,scale=0.5;this.occlusionRenderTarget=new THREE.WebGLRenderTarget(w*scale,h*scale);this.occlusionComposer=new THREE.EffectComposer(renderer,this.occlusionRenderTarget);this.occlusionComposer.addPass(new THREE.RenderPass(scene,camera));let oP=new THREE.ShaderPass({uniforms:{tDiffuse:{value:null},lightPosition:{value:new THREE.Vector2(0.5,0.5)},exposure:{value:0.21},decay:{value:0.95},density:{value:0.1},weight:{value:0.7},samples:{value:50}},vertexShader:this.getScriptContent('#shader-passthrough-vertex'),fragmentShader:this.getScriptContent('#shader-volumetric-light-fragment')});oP.needsSwap=false;this.occlusionPass=oP;this.occlusionComposer.addPass(oP);this.composer=new THREE.EffectComposer(renderer);this.composer.addPass(new THREE.RenderPass(scene,camera));let aP=new THREE.ShaderPass({uniforms:{tDiffuse:{value:null},tAdd:{value:null}},vertexShader:this.getScriptContent('#shader-passthrough-vertex'),fragmentShader:this.getScriptContent('#shader-additive-fragment')});aP.uniforms.tAdd.value=this.occlusionRenderTarget.texture;this.composer.addPass(aP);}
  addRenderTargetImage(){const mat=new THREE.ShaderMaterial({uniforms:{tDiffuse:{value:null},vertexShader:this.getScriptContent('#shader-passthrough-vertex'),fragmentShader:this.getScriptContent('#shader-passthrough-fragment')}});mat.uniforms.tDiffuse.value=this.occlusionRenderTarget.texture;const mesh=new THREE.Mesh(new THREE.PlaneBufferGeometry(2,2),mat);mesh.visible=false;this.composer.passes[1].scene.add(mesh);}
  initMazeMesh(){const{scene}=this,geo=new THREE.Geometry();const mk=(pos,rx,ry,rz,px,py,pz)=>{const m=this.getGamePlaneGeometry('#map-test');if(px!==undefined)m.position.set(px,py,pz);if(rx!==undefined){m.rotation.x=rx;m.rotation.y=ry||0;m.rotation.z=rz||0;}m.updateMatrix();geo.merge(m.geometry,m.matrix);};const h=CUBE_SIZE/2;mk(null,0,0,0,0,h,0);mk(null,0,0,Math.PI/2,h,0,0);mk(null,Math.PI/2,0,0,0,0,h-0.25);mk(null,Math.PI/2,0,0,0,0,-h+0.25);mk(null,0,0,0,0,-h,0);mk(null,Math.PI/2,0,0,0,0,-h);this.mazeMesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:0x4583dc}));this.mazeMesh.updateMatrix();scene.add(this.mazeMesh);}
  getGamePlaneGeometry(id){return new THREE.Mesh(new MapBoundariesMesh(new BoardMap(id)).geometry);}
  attachEvents(){window.addEventListener("resize",this.updateSize.bind(this));window.addEventListener("mousemove",this.onMouseMove.bind(this));}
  onMouseMove(e){this.mouse.x=e.clientX/window.innerWidth*2-1;this.mouse.y=-(e.clientY/window.innerHeight)*2+1;}
  updateSize(){const{renderer,camera,composer,occlusionComposer}=this,{innerWidth:w,innerHeight:h}=window;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();composer.setSize(w,h);occlusionComposer.setSize(w,h);this.width=w;this.height=h;}
  updateOcclusionIntensity(time){const{uniforms:u}=this.occlusionPass,n0=(noise.perlin2(time*.0005,0)+1)*.5,n1=(noise.perlin2(0,time*.0005)+1)*.5;u.exposure.value=THREE.Math.lerp(0.05,0.21,n0);u.decay.value=THREE.Math.lerp(0.95,0.98,n1);u.density.value=THREE.Math.lerp(0.2,0.4,n0);u.weight.value=THREE.Math.lerp(0.1,0.7,n1);}
  updateLightPosition(time){const n0=(noise.perlin2(time*.0005,0)+1)*.5;this.lightSphere.position.y=THREE.Math.lerp(-1,1,n0);}
  updateCameraTilt(){TweenMax.to(this.camera.position,1.5,{x:14+this.mouse.x*2.5,y:14+this.mouse.y*2.5,z:14+this.mouse.x*this.mouse.y});}
  onFrame(time){requestAnimationFrame(this.onFrame.bind(this));this.camera.layers.set(1);this.updateCameraTilt();this.particles.update(this.clock.getDelta());this.updateOcclusionIntensity(time);this.updateLightPosition(time);this.renderer.setClearColor(0x0,0);this.occlusionComposer.render();this.camera.layers.set(0);this.camera.lookAt(this.scene.position);this.composer.render();}
}

window.app = new App();
  </script>

<script>
(function(){
  var playBtn=document.getElementById('uwuPlayBtn');
  var pickBtn=document.getElementById('uwuPickBtn');
  var pickFile=document.getElementById('uwuPickFile');
  var toast=document.getElementById('uwuToast');
  var tHide;
  function say(m){ if(!toast)return; toast.textContent=m; toast.classList.add('show'); clearTimeout(tHide); tHide=setTimeout(function(){toast.classList.remove('show');},2800); }
  function setPlaying(on){ playBtn.classList[on?'add':'remove']('playing'); }
  function bind(a){ if(a.__uwuBound)return; a.__uwuBound=true; a.addEventListener('play',function(){setPlaying(true);}); a.addEventListener('pause',function(){setPlaying(false);}); }
  function getAudio(){
    var a=document.getElementById('uwuBgm');
    if(!a){ a=document.createElement('audio'); a.id='uwuBgm'; a.loop=true; a.setAttribute('playsinline',''); a.style.display='none'; document.body.appendChild(a); }
    bind(a); return a;
  }
  playBtn.addEventListener('click',function(){
    var a=getAudio();
    if(!a.src){ say('Toca ＋ para subir tu canción 🎵'); pickFile.click(); return; }
    if(a.paused){ a.play().then(function(){setPlaying(true);}).catch(function(){ say('Toca ＋ para subir tu canción 🎵'); }); }
    else { a.pause(); setPlaying(false); }
  });
  pickBtn.addEventListener('click',function(){ pickFile.click(); });
  pickFile.addEventListener('change',function(){
    if(pickFile.files&&pickFile.files[0]){
      var a=getAudio();
      a.src=URL.createObjectURL(pickFile.files[0]);
      a.play().then(function(){setPlaying(true);say('🎶 '+pickFile.files[0].name);}).catch(function(){});
    }
  });
  window.addEventListener('load',function(){ var a=document.getElementById('uwuBgm'); if(a){ bind(a); if(!a.paused)setPlaying(true); } });
})();
</script>
