<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="robots" content="noindex"/>
<title>🌻 Para mamá — UWU</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,sans-serif;min-height:100svh;color:#fff;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative}
#uwuBg{position:fixed;inset:0;width:100%;height:100%;z-index:0}
.wrap{position:relative;z-index:2;max-width:420px;width:100%;text-align:center;background:rgba(12,10,20,.34);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-radius:28px;padding:34px 24px;border:1px solid rgba(255,255,255,.18);box-shadow:0 20px 60px rgba(0,0,0,.35);animation:wrapIn .9s cubic-bezier(.2,.9,.3,1.3) both}
@keyframes wrapIn{0%{opacity:0;transform:translateY(24px) scale(.94)}100%{opacity:1;transform:none}}
.big{font-size:66px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.4));cursor:pointer;transition:transform .2s}
.big:hover{transform:scale(1.08)}
h1{font-size:1.5rem;margin-bottom:10px;letter-spacing:.3px}
.sub{font-size:12.5px;opacity:.85;margin-top:10px;line-height:1.5}
.msg{margin:16px 0;font-size:15.5px;line-height:1.75;font-style:italic;min-height:2.6em}
.pill{display:inline-block;margin-top:14px;padding:13px 26px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;transition:transform .18s,background .25s,box-shadow .25s}
.pill:hover{transform:translateY(-2px) scale(1.03);background:rgba(255,255,255,.26);box-shadow:0 10px 26px rgba(0,0,0,.3)}
.pill:active{transform:translateY(0) scale(.98)}
.code{margin-top:16px;font-size:10px;opacity:.6;font-family:ui-monospace,Menlo,monospace;letter-spacing:1px}
.note{opacity:.5;margin-top:6px}

body{background:linear-gradient(160deg,#7a3a12,#F2BC5C)}

</style>
</head>
<body>
<canvas id="uwuBg"></canvas>

<div class="wrap">
<div class="big" id="bigEmoji">🌻</div>
<h1>Para mamá</h1>
<p class="sub" id="uwuSubtitle">__UWU_SUBTITLE__</p>
<p class="msg" id="uwuMsg">__UWU_MSG__</p>

<button class="pill" id="actionBtn" type="button">Un abrazo enorme 🤗</button>
<div class="code">__UWU_CODE__</div>
<p class="sub note">Plantilla UWU-RAIZ · UWU</p>
</div>
<script>

var UWUFX=(function(){
  function canvas(){ var c=document.getElementById('uwuBg'); var x=c.getContext('2d'); function fit(){c.width=innerWidth;c.height=innerHeight;} fit(); addEventListener('resize',fit); return {c:c,x:x}; }
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function heart(x,ctx,px,py,s,col){ ctx.save();ctx.translate(px,py);ctx.scale(s,s);ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,-3);ctx.bezierCurveTo(3,-9,11,-2,0,7);ctx.bezierCurveTo(-11,-2,-3,-9,0,-3);ctx.fill();ctx.restore(); }
  function burst(px,py,cols){ cols=cols||['#ff5c8a','#ffd1e0','#c084fc','#ffffff']; var ps=[]; for(var i=0;i<26;i++){var a=Math.random()*6.28,sp=rnd(1,5);ps.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,l:1,s:rnd(.4,1),c:cols[i%cols.length]});} var lay=document.getElementById('uwuFxLayer'); if(!lay){lay=document.createElement('canvas');lay.id='uwuFxLayer';lay.style.cssText='position:fixed;inset:0;z-index:50;pointer-events:none';document.body.appendChild(lay);} lay.width=innerWidth;lay.height=innerHeight; var lx=lay.getContext('2d'); var run=lay.__run; if(!run){ (function loop(){ lx.clearRect(0,0,lay.width,lay.height); for(var k=lay.__ps.length-1;k>=0;k--){var p=lay.__ps[k];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.l-=.016;lx.globalAlpha=Math.max(0,p.l);heart(0,lx,p.x,p.y,p.s*1.6,p.c);if(p.l<=0)lay.__ps.splice(k,1);} lx.globalAlpha=1; lay.__raf=requestAnimationFrame(loop);})(); lay.__run=true; } lay.__ps=(lay.__ps||[]).concat(ps); }
  return {canvas:canvas,rnd:rnd,heart:heart,burst:burst};
})();


(function(){
  var p=new URLSearchParams(location.search);
  var para=p.get('para')||'', de=p.get('de')||'';
  var msg=p.get('msg'), sub=p.get('subtitle'), code=p.get('code');
  var mEl=document.getElementById('uwuMsg'), sEl=document.getElementById('uwuSubtitle'), cEl=document.querySelector('.code');
  function isPh(t){return !t||t.indexOf('__UWU_')===0;}
  if(msg) mEl.textContent=msg; else if(isPh(mEl.textContent)) mEl.textContent="Mamá, gracias por cada sacrificio, cada consejo y cada abrazo. Eres mi raíz y mi refugio. Te amo más de lo que las palabras alcanzan a decir.";
  if(sub) sEl.textContent=sub;
  else if(para||de) sEl.textContent=("Para {para} — de {de}").replace('{para}',para||'ti').replace('{de}',de||'alguien que te ama');
  else if(isPh(sEl.textContent)) sEl.textContent="Para la mujer que lo dio todo";
  if(code) cEl.textContent='Código: '+code; else if(isPh(cEl.textContent)) cEl.textContent='';
})();

var G=UWUFX.canvas(),x=G.x,fl=[];for(var i=0;i<26;i++)fl.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:UWUFX.rnd(.3,1),e:Math.random()<.5?'🌻':'🌼',s:UWUFX.rnd(12,24)});
 function d(){var W=G.c.width,H=G.c.height;x.clearRect(0,0,W,H);for(var i=0;i<fl.length;i++){var f=fl[i];f.y-=f.v;if(f.y<-20){f.y=H+20;f.x=Math.random()*W;}x.globalAlpha=.75;x.font=f.s+'px serif';x.fillText(f.e,f.x,f.y);}x.globalAlpha=1;requestAnimationFrame(d);}d();
 document.getElementById('actionBtn').onclick=function(){for(var i=0;i<3;i++)setTimeout(function(){UWUFX.burst(innerWidth/2,innerHeight*0.4,['#ffd166','#ffe8a3','#ff9ec7']);},i*140);};
</script>
<!-- ===== UWU KIT · marca + música (subir tu propio MP3) ===== -->
<a id="uwuBrand" href="../index.html" aria-label="Volver a UWU">
  <span class="uwu-mark">UWU</span>
  <span class="uwu-sub">hecho con amor</span>
</a>
<div id="uwuDock">
  <button id="uwuPlayBtn" type="button" title="Reproducir / Pausar música">🎵</button>
  <button id="uwuPickBtn" type="button" title="Subir tu canción (MP3)">＋</button>
  <input id="uwuPickFile" type="file" accept="audio/*" hidden>
</div>
<div id="uwuToast"></div>
<style>
  #uwuBrand{position:fixed;top:14px;right:14px;z-index:99999;display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1;transition:transform .25s}
  #uwuBrand:hover{transform:scale(1.06)}
  #uwuBrand .uwu-mark{font-weight:800;font-size:20px;letter-spacing:1px;background:linear-gradient(135deg,#ff4fa3,#a855f7,#38bdf8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
  #uwuBrand .uwu-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.78);text-shadow:0 1px 4px rgba(0,0,0,.55)}
  #uwuDock{position:fixed;bottom:16px;right:16px;z-index:99999;display:flex;gap:8px}
  #uwuDock button{width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(20,18,30,.55);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s;box-shadow:0 6px 20px rgba(0,0,0,.35)}
  #uwuDock button:hover{transform:translateY(-3px) scale(1.05);background:rgba(255,79,163,.6)}
  #uwuDock button.playing{background:linear-gradient(135deg,#ff4fa3,#a855f7);animation:uwuPulse 1.6s ease-in-out infinite}
  @keyframes uwuPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,79,163,.55)}50%{box-shadow:0 0 0 12px rgba(255,79,163,0)}}
  #uwuToast{position:fixed;bottom:74px;right:16px;z-index:99999;max-width:230px;padding:10px 14px;border-radius:12px;background:rgba(20,18,30,.92);color:#fff;font:12px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none}
  #uwuToast.show{opacity:1;transform:translateY(0)}
  @media(max-width:480px){#uwuBrand .uwu-mark{font-size:17px}#uwuDock button{width:44px;height:44px;font-size:18px}}
</style>
<script>
(function(){
  var playBtn=document.getElementById('uwuPlayBtn');
  var pickBtn=document.getElementById('uwuPickBtn');
  var pickFile=document.getElementById('uwuPickFile');
  var toast=document.getElementById('uwuToast');
  var tHide;
  function say(m){ if(!toast)return; toast.textContent=m; toast.classList.add('show'); clearTimeout(tHide); tHide=setTimeout(function(){toast.classList.remove('show');},2800); }
  function setPlaying(on){ playBtn.classList[on?'add':'remove']('playing'); }
  function bind(a){ if(a.__uwuBound)return; a.__uwuBound=true; a.addEventListener('play',function(){setPlaying(true);}); a.addEventListener('pause',function(){setPlaying(false);}); }
  function getAudio(){
    var a=document.getElementById('uwuBgm');
    if(!a){ a=document.createElement('audio'); a.id='uwuBgm'; a.loop=true; a.setAttribute('playsinline',''); a.style.display='none'; document.body.appendChild(a); }
    bind(a); return a;
  }
  playBtn.addEventListener('click',function(){
    var a=getAudio();
    if(!a.src){ say('Toca ＋ para subir tu canción 🎵'); pickFile.click(); return; }
    if(a.paused){ a.play().then(function(){setPlaying(true);}).catch(function(){ say('Toca ＋ para subir tu canción 🎵'); }); }
    else { a.pause(); setPlaying(false); }
  });
  pickBtn.addEventListener('click',function(){ pickFile.click(); });
  pickFile.addEventListener('change',function(){
    if(pickFile.files&&pickFile.files[0]){
      var a=getAudio();
      a.src=URL.createObjectURL(pickFile.files[0]);
      a.play().then(function(){setPlaying(true);say('🎶 '+pickFile.files[0].name);}).catch(function(){});
    }
  });
  window.addEventListener('load',function(){ var a=document.getElementById('uwuBgm'); if(a){ bind(a); if(!a.paused)setPlaying(true); } });
})();
</script>
