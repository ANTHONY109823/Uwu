<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Lluvia de Frases 💗</title>
  <style>
    body { margin:0; overflow:hidden; background-color:black; font-family:'Segoe UI',sans-serif; }
    canvas { display:block; position:absolute; top:0; left:0; z-index:0; }
    .mensaje-centro {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:3em; font-weight:bold; text-align:center; z-index:1;
      animation:colores 3s infinite linear; text-shadow:2px 2px 10px #00fff2;
    }
    .mensaje-abajo {
      position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
      font-size:2em; font-weight:bold; color:#2600ff;
      text-shadow:2px 2px 8px #000; z-index:2; letter-spacing:2px;
    }
    .audio-btn {
      position:fixed; bottom:20px; right:20px; width:60px; height:60px;
      border:none; border-radius:50%; background:rgba(255,20,147,.25);
      backdrop-filter:blur(5px); color:white; font-size:24px; cursor:pointer;
      z-index:999; box-shadow:0 0 15px #ff1493; transition:.3s;
    }
    .audio-btn:hover { transform:scale(1.1); box-shadow:0 0 25px #ff69b4; }
    .back-btn {
      position:fixed; top:12px; left:12px; padding:7px 14px; border-radius:999px;
      background:rgba(255,20,147,.2); border:1px solid rgba(255,20,147,.35);
      color:#ff69b4; font-size:12px; text-decoration:none; z-index:1000;
    }
    .back-btn:hover { background:rgba(255,20,147,.35); }
    @keyframes colores {
      0%   { color:#ff69b4; }
      25%  { color:#ff0088; }
      50%  { color:#c71585; }
      75%  { color:#e22bae; }
      100% { color:#ff69b4; }
    }
  </style>
</head>
<body>
  <a class="back-btn" href="../index.html">← Volver a UWU</a>
  <canvas id="canvas"></canvas>

  <div class="mensaje-centro">ME GUSTAS MUCHO MI AMOR ❤️</div>
  <div class="mensaje-abajo">😍 bebecita 😍</div>

  <button class="audio-btn" id="audioBtn">🎵</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
    resizeCanvas();

    const phrases = ["PRECIOSA", "ERES ÚNICA"];
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function randomColor() {
      const colors = ["#ff1493","#ff007f","#ff69b4","#ff66cc","#ff4fa3","#ff6eb4","#ff3cac","#ff85c1"];
      return colors[Math.floor(Math.random() * colors.length)];
    }
    function randomPhrase() { return phrases[Math.floor(Math.random() * phrases.length)]; }

    function draw() {
      ctx.fillStyle = "rgba(0,0,0,0.1)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = fontSize + "px Arial";
      for (let i = 0; i < drops.length; i++) {
        ctx.fillStyle = randomColor();
        ctx.fillText(randomPhrase(), i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 100);
    window.addEventListener('resize', resizeCanvas);

    document.getElementById('audioBtn').addEventListener('click', function() {
      var a = document.getElementById('uwu-audio-el');
      if (!a) return;
      if (a.paused) { a.play(); this.textContent='⏸︎'; }
      else { a.pause(); this.textContent='🎵'; }
    });
  </script>

__UWU_AUDIO__
</body>
</html>
