    <style>
        body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; }
        .hidden { display:none !important; }
        @media (max-width:768px) {
            .romantic-text { font-size:4rem !important; line-height:1.2 !important; text-align:center !important; padding:20px !important; width:100% !important; max-width:100% !important; word-wrap:break-word !important; overflow-wrap:break-word !important; }

        }
        @media (max-width:480px) { .romantic-text { font-size:3.8rem !important; line-height:1.2 !important; padding:30px 15px !important; } }
        @media (max-width:360px) { .romantic-text { font-size:3.5rem !important; line-height:1.2 !important; padding:25px 10px !important; } }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:linear-gradient(135deg,#e542a1 0%,#f44780 25%,#3890dd 50%,#c654ce 75%,#e542a1 100%);
            min-height:100vh; display:flex; justify-content:center; align-items:center;
            font-family:'Poppins',sans-serif; overflow-x:hidden; overflow-y:auto; padding:20px;
        }
        .container { text-align:center; position:relative; max-width:90vw; width:100%; }
        .drawing-area { position:relative; padding:10px; display:flex; justify-content:center; align-items:center; }
        .hello-kitty-svg { width:min(400px,85vw); height:min(400px,85vw); background:transparent; border:none; box-shadow:none; }
        .hello-kitty-svg path { stroke-dasharray:0; stroke-dashoffset:0; fill-opacity:0; stroke-opacity:0; }
        .hello-kitty-svg .main-outline { stroke:#000; stroke-width:3; fill:none; stroke-dasharray:1500; stroke-dashoffset:1500; animation:drawOutline 3s ease-in-out 0.5s forwards; }
        .hello-kitty-svg .face { fill:#ffffff; stroke:#000; stroke-width:2; stroke-dasharray:1200; stroke-dashoffset:1200; fill-opacity:0; animation:drawAndFill 2s ease-in-out 3.5s forwards; }
        .hello-kitty-svg .bow { fill:#cc2229; stroke:#000; stroke-width:1.5; stroke-dasharray:600; stroke-dashoffset:600; fill-opacity:0; animation:drawAndFill 1.5s ease-in-out 5.5s forwards; }
        .hello-kitty-svg .bow-detail { fill:#cc2229; stroke:#000; stroke-width:1.5; stroke-dasharray:500; stroke-dashoffset:500; fill-opacity:0; animation:drawAndFill 1s ease-in-out 6.2s forwards; }
        .hello-kitty-svg .bow-center { fill:#cc2229; animation:fadeIn 0.5s ease-in-out 7s forwards; }
        .hello-kitty-svg .eye-left,.hello-kitty-svg .eye-right { fill:#000; animation:fadeIn 0.8s ease-in-out 7.5s forwards; }
        .hello-kitty-svg .nose { fill:#000; animation:fadeIn 0.5s ease-in-out 8s forwards; }
        .hello-kitty-svg .nose-inner { fill:#f2c831; animation:fadeIn 0.3s ease-in-out 8.3s forwards; }
        .hello-kitty-svg .whisker-left-1,.hello-kitty-svg .whisker-left-2,.hello-kitty-svg .whisker-left-3,
        .hello-kitty-svg .whisker-right-1,.hello-kitty-svg .whisker-right-2,.hello-kitty-svg .whisker-right-3 {
            stroke:#000; stroke-width:2; stroke-linecap:round; stroke-dasharray:50; stroke-dashoffset:50; animation:drawWhisker 0.8s ease-in-out forwards;
        }
        .hello-kitty-svg .whisker-left-1  { animation-delay:8.5s; }
        .hello-kitty-svg .whisker-left-2  { animation-delay:8.7s; }
        .hello-kitty-svg .whisker-left-3  { animation-delay:8.9s; }
        .hello-kitty-svg .whisker-right-1 { animation-delay:9.1s; }
        .hello-kitty-svg .whisker-right-2 { animation-delay:9.3s; }
        .hello-kitty-svg .whisker-right-3 { animation-delay:9.5s; }
        @keyframes drawOutline { 0%{stroke-dashoffset:1500;stroke-opacity:0} 10%{stroke-opacity:1} 100%{stroke-dashoffset:0;stroke-opacity:1} }
        @keyframes drawAndFill { 0%{stroke-dashoffset:1200;stroke-opacity:0;fill-opacity:0} 10%{stroke-opacity:1} 70%{stroke-dashoffset:0;stroke-opacity:1;fill-opacity:0} 100%{stroke-dashoffset:0;stroke-opacity:1;fill-opacity:1} }
        @keyframes drawWhisker { 0%{stroke-dashoffset:50;stroke-opacity:0} 20%{stroke-opacity:1} 100%{stroke-dashoffset:0;stroke-opacity:1} }
        @keyframes fadeIn { 0%{fill-opacity:0} 100%{fill-opacity:1} }
        .continue-btn {
            margin-top:30px; padding:12px 24px; background:rgb(0,234,255); color:#000;
            border:1px solid #000; border-radius:50px; font-size:16px; font-family:'Poppins',sans-serif;
            font-weight:400; cursor:pointer; backdrop-filter:blur(10px); transition:all .3s ease;
            opacity:0; transform:translateY(20px); letter-spacing:.5px;
        }
        .continue-btn:hover { background:#fff; border-color:rgba(0,0,0,.4); transform:translateY(-1px); box-shadow:0 4px 20px rgba(0,0,0,.1); color:#00aeff; }
        .continue-btn:active { transform:translateY(0); box-shadow:0 2px 10px rgba(0,0,0,.1); }
        .container { opacity:0; animation:containerFadeIn 1s ease-out forwards; }
        @keyframes containerFadeIn { 0%{opacity:0;transform:scale(.9)} 100%{opacity:1;transform:scale(1)} }
        .drawing-area::before { display:none; }
        .romantic-message {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:linear-gradient(135deg,#ffeef8 0%,#fff0f5 25%,#f0f8ff 50%,#f5f0ff 75%,#fff5ee 100%);
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            z-index:1000; opacity:0; visibility:hidden; transform:scale(.95);
            transition:all .6s cubic-bezier(.175,.885,.32,1.275); padding:20px;
        }
        .romantic-message.show { opacity:1; visibility:visible; transform:scale(1); }
        .romantic-text {
            font-family:'Dancing Script',cursive; font-size:min(3rem,6vw); font-weight:600; color:#8b5a83;
            text-align:center; line-height:1.4; margin-bottom:20px;
            text-shadow:0 2px 4px rgba(139,90,131,.1); max-width:90%;
            word-wrap:break-word; overflow-wrap:break-word; display:block; padding:0 20px;
        }
        .typing-text { display:block; max-width:95%; margin:0 auto; text-align:center; word-wrap:break-word; overflow-wrap:break-word; white-space:normal; line-height:1.3; min-height:100px; }
        .typing-cursor { display:inline-block; width:3px; height:1em; background:#8b5a83; margin-left:4px; animation:blink-caret .75s step-end infinite; vertical-align:middle; }
        @keyframes blink-caret { 0%,100%{opacity:1} 50%{opacity:0} }
        .hearts-container { position:absolute; bottom:0; left:0; width:100%; height:200px; overflow:hidden; pointer-events:none; opacity:0; animation:showHearts 1s ease-out 8s forwards; }
        .heart { position:absolute; width:20px; height:20px; background:#e91e63; transform:rotate(45deg); animation:floatUp 6s ease-out infinite; }
        .heart::before { content:''; position:absolute; width:20px; height:20px; background:#e91e63; border-radius:50%; top:-10px; left:0; }
        .heart::after  { content:''; position:absolute; width:20px; height:20px; background:#e91e63; border-radius:50%; top:0; left:-10px; }
        .heart:nth-child(1){left:15%;animation-delay:0s}
        .heart:nth-child(2){left:25%;animation-delay:.8s;background:#f06292} .heart:nth-child(2)::before,.heart:nth-child(2)::after{background:#f06292}
        .heart:nth-child(3){left:35%;animation-delay:1.6s}
        .heart:nth-child(4){left:45%;animation-delay:2.4s;background:#f8bbd9} .heart:nth-child(4)::before,.heart:nth-child(4)::after{background:#f8bbd9}
        .heart:nth-child(5){left:55%;animation-delay:3.2s}
        .heart:nth-child(6){left:65%;animation-delay:4s;background:#f06292} .heart:nth-child(6)::before,.heart:nth-child(6)::after{background:#f06292}
        .heart:nth-child(7){left:75%;animation-delay:4.8s}
        .heart:nth-child(8){left:85%;animation-delay:5.6s;background:#f8bbd9} .heart:nth-child(8)::before,.heart:nth-child(8)::after{background:#f8bbd9}

        @keyframes showHearts { 0%{opacity:0} 100%{opacity:1} }

        }

            .romantic-text{font-size:2rem !important;line-height:1.3 !important;max-width:95%;padding:20px 10px;min-height:120px;text-align:center}
            .typing-text{max-width:95%;text-align:center;font-size:2rem !important;word-wrap:break-word;white-space:normal} .typing-cursor{height:1.5rem}
            .romantic-subtitle{font-size:min(.9rem,4.5vw);padding:0 10px;margin-top:15px} .hearts-container{height:120px}
            .heart{width:14px;height:14px} .heart::before,.heart::after{width:14px;height:14px} .heart::before{top:-7px} .heart::after{left:-7px}
        }

    <script>
function applyPersonalization() {
    var params     = new URLSearchParams(location.search);
    var typingText = document.getElementById('typingText');
    var subtitleEl = document.getElementById('romanticSubtitle');
    var codeBadge  = document.getElementById('codeBadge');
    var msg        = typingText.textContent.trim();
    var subtitle   = subtitleEl.textContent.trim();
    var code       = codeBadge.textContent.trim();
    if (params.get('msg')) msg = params.get('msg');
    if (params.get('de') || params.get('para')) {
        subtitle = 'TE AMO MUCHO, ' + (params.get('para')||'') + ' — ' + (params.get('de')||'') + ' ✨';
    }
    if (params.get('code')) code = params.get('code');
    typingText.textContent = msg;
    subtitleEl.textContent = subtitle;
    if (code && code !== 'UWU-UB5U-LMPJ') { codeBadge.textContent = code; codeBadge.classList.remove('hidden'); }
}

document.addEventListener('DOMContentLoaded', function() {
    applyPersonalization();
    var continueBtn = document.getElementById('continueBtn');
    var svg         = document.querySelector('.hello-kitty-svg');
    var romanticMsg = document.getElementById('romanticMessage');
    var typingText  = document.getElementById('typingText');

    setTimeout(function() {
        continueBtn.classList.remove('hidden');
        continueBtn.style.opacity    = '1';
        continueBtn.style.transform  = 'translateY(0)';
        continueBtn.style.transition = 'all 0.8s ease-out';
    }, 10000);

    continueBtn.addEventListener('click', function() {
        continueBtn.style.transform  = 'scale(0.95)';
        continueBtn.style.transition = 'transform 0.1s ease';
        setTimeout(function() { continueBtn.style.transform = 'scale(1)'; showRomanticMessage(); }, 100);
    });

    function showRomanticMessage() {
        romanticMsg.classList.add('show');
        var fullText = typingText.textContent;
        typingText.textContent = '';
        var cursor = document.createElement('span');
        cursor.className = 'typing-cursor';
        typingText.appendChild(cursor);
        var charIndex = 0;
        function typeWriter() {
            if (charIndex < fullText.length) {
                typingText.insertBefore(document.createTextNode(fullText.charAt(charIndex)), cursor);
                charIndex++;
                setTimeout(typeWriter, 80);
            } else {
                setTimeout(function() {
                    document.querySelectorAll('.heart').forEach(function(h) {
                        h.style.setProperty('--drift', (Math.random()-0.5)*40 + 'px');
                    });
                }, 2000);
            }
        }
        setTimeout(typeWriter, 300);
    }

    svg.addEventListener('mouseenter', function() { this.style.transform='scale(1.02)'; this.style.transition='transform 0.3s ease'; });
    svg.addEventListener('mouseleave', function() { this.style.transform='scale(1)'; });
});

function closeMessage() { document.getElementById('romanticMessage').classList.remove('show'); }
    </script>
