<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Esfera del Dragón 🐉</title>
  <style>
    body {
      display:flex; justify-content:center; align-items:center;
      background-color:#111; height:100vh; margin:0;
    }
    .dragon-ball {
      position:relative; width:200px; height:200px;
      background:radial-gradient(circle at 30% 30%,#ffa500,#ff4500);
      border-radius:50%; box-shadow:inset 0 0 20px rgb(255,98,0);
    }
    .star {
      position:absolute; width:30px; height:30px; background-color:#ff0000;
      clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      transform-origin:center center;
    }
    .star:nth-child(1){ top:50%; left:50%; transform:translate(-50%,-50%) scale(1.2); }
    .star:nth-child(2){ top:30%; left:30%; transform:translate(-50%,-50%); }
    .star:nth-child(3){ top:30%; left:70%; transform:translate(-50%,-50%); }
    .star:nth-child(4){ top:70%; left:30%; transform:translate(-50%,-50%); }
    .star:nth-child(5){ top:70%; left:70%; transform:translate(-50%,-50%); }
    .star:nth-child(6){ top:50%; left:20%; transform:translate(-50%,-50%); }
    .star:nth-child(7){ top:50%; left:80%; transform:translate(-50%,-50%); }

    .dragon-ball::before {
      content:""; position:absolute; top:10%; left:15%; width:70%; height:70%;
      background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.8),transparent 70%);
      border-radius:50%; filter:blur(10px); opacity:.7; animation:pulse 4s infinite alternate;
    }
    .dragon-ball::after {
      content:""; position:absolute; top:10px; left:20px; width:160px; height:60px;
      background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.9),transparent 70%);
      border-radius:50%; filter:blur(8px); opacity:.8; transform:rotate(-20deg);
    }
    @keyframes pulse {
      0%   { opacity:.4; transform:scale(.95); }
      100% { opacity:.9; transform:scale(1.05); }
    }
    .dragon-logo {
      position:absolute; top:-60%; left:50%; width:220px;
      transform:translate(-50%,-50%);
    }
    .zoom { animation:zoomSmooth 1.5s ease-in-out; }
    @keyframes zoomSmooth {
      0%   { transform:scale(1); box-shadow:0 0 0 rgba(255,180,0,0); }
      50%  { transform:scale(1.25); box-shadow:0 0 60px rgba(255,179,0,.6),0 0 120px rgba(255,102,0,.4); }
      100% { transform:scale(1); box-shadow:0 0 0 rgba(255,180,0,0); }
    }
    .back-btn {
      position:fixed; top:12px; left:12px; padding:7px 14px; border-radius:999px;
      background:rgba(255,100,0,.2); border:1px solid rgba(255,150,0,.4);
      color:#ffa500; font-size:12px; text-decoration:none; z-index:200;
    }
    .back-btn:hover { background:rgba(255,100,0,.35); }
    .hint {
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      color:#ffa500; font-size:13px; font-family:sans-serif; opacity:.7;
    }
  </style>
</head>
<body>
  <div id="uwuMsg" style="position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:50;max-width:90%;text-align:center;color:#fff;font:600 14px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-shadow:0 2px 10px rgba(0,0,0,.7);pointer-events:none" data-default="Pide un deseo… 🐉">__UWU_MSG__</div>
  <div id="uwuSubtitle" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;color:rgba(255,255,255,.75);font:12px/1.4 -apple-system,sans-serif;text-shadow:0 1px 6px #000" data-default="">__UWU_SUBTITLE__</div>
  <div id="uwuCode" style="position:fixed;bottom:58px;left:50%;transform:translateX(-50%);z-index:50;color:rgba(255,255,255,.45);font:10px monospace">__UWU_CODE__</div>
  <a class="back-btn" href="../index.html">← Volver a UWU</a>
  <div class="hint">¡Toca la esfera! 🐉</div>

  <div class="dragon-ball" id="dragon-ball">
    <img src="https://i.postimg.cc/pdrQzFfJ/dragonballsuper.png" class="dragon-logo" alt="">
    <div class="dragon-ball">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>
  </div>

  <script>
    const ball = document.getElementById("dragon-ball");
    ball.addEventListener("click", () => {
      ball.classList.add("zoom");
      setTimeout(() => ball.classList.remove("zoom"), 1500);
    });
  </script>

<!-- ===== UWU KIT · marca + música (subir tu propio MP3) ===== -->
<a id="uwuBrand" href="../index.html" aria-label="Volver a UWU">
  <span class="uwu-mark">UWU</span>
  <span class="uwu-sub">hecho con amor</span>
</a>
<div id="uwuDock">
  <button id="uwuPlayBtn" type="button" title="Reproducir / Pausar música">🎵</button>
  <button id="uwuPickBtn" type="button" title="Subir tu canción (MP3)">＋</button>
  <input id="uwuPickFile" type="file" accept="audio/*" hidden>
</div>
<div id="uwuToast"></div>
<style>
  #uwuBrand{position:fixed;top:14px;right:14px;z-index:99999;display:flex;flex-direction:column;align-items:flex-end;gap:2px;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1;transition:transform .25s}
  #uwuBrand:hover{transform:scale(1.06)}
  #uwuBrand .uwu-mark{font-weight:800;font-size:20px;letter-spacing:1px;background:linear-gradient(135deg,#ff4fa3,#a855f7,#38bdf8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))}
  #uwuBrand .uwu-sub{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.78);text-shadow:0 1px 4px rgba(0,0,0,.55)}
  #uwuDock{position:fixed;bottom:16px;right:16px;z-index:99999;display:flex;gap:8px}
  #uwuDock button{width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(20,18,30,.55);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s;box-shadow:0 6px 20px rgba(0,0,0,.35)}
  #uwuDock button:hover{transform:translateY(-3px) scale(1.05);background:rgba(255,79,163,.6)}
  #uwuDock button.playing{background:linear-gradient(135deg,#ff4fa3,#a855f7);animation:uwuPulse 1.6s ease-in-out infinite}
  @keyframes uwuPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,79,163,.55)}50%{box-shadow:0 0 0 12px rgba(255,79,163,0)}}
  #uwuToast{position:fixed;bottom:74px;right:16px;z-index:99999;max-width:230px;padding:10px 14px;border-radius:12px;background:rgba(20,18,30,.92);color:#fff;font:12px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none}
  #uwuToast.show{opacity:1;transform:translateY(0)}
  @media(max-width:480px){#uwuBrand .uwu-mark{font-size:17px}#uwuDock button{width:44px;height:44px;font-size:18px}}
</style>
<script>
(function(){
  var playBtn=document.getElementById('uwuPlayBtn');
  var pickBtn=document.getElementById('uwuPickBtn');
  var pickFile=document.getElementById('uwuPickFile');
  var toast=document.getElementById('uwuToast');
  if(!playBtn) return;
  var tHide;
  function say(m){ if(!toast)return; toast.textContent=m; toast.classList.add('show'); clearTimeout(tHide); tHide=setTimeout(function(){toast.classList.remove('show');},2800); }
  function setPlaying(on){ playBtn.classList[on?'add':'remove']('playing'); }
  function bind(a){ if(a.__uwuBound)return; a.__uwuBound=true; a.addEventListener('play',function(){setPlaying(true);}); a.addEventListener('pause',function(){setPlaying(false);}); }
  function getAudio(){
    var a=document.getElementById('uwuBgm');
    if(!a){ a=document.createElement('audio'); a.id='uwuBgm'; a.loop=true; a.setAttribute('playsinline',''); a.style.display='none'; document.body.appendChild(a); }
    bind(a); return a;
  }
  function hasSrc(a){ return !!(a && (a.getAttribute('src')||a.src)); }
  playBtn.addEventListener('click',function(){
    var a=getAudio();
    if(!hasSrc(a)){ say('Toca ＋ para subir tu canción 🎵'); if(pickFile) pickFile.click(); return; }
    if(a.paused){ a.play().then(function(){setPlaying(true);}).catch(function(){ say('Toca la pantalla para activar el audio'); }); }
    else { a.pause(); setPlaying(false); }
  });
  if(pickBtn&&pickFile){
    pickBtn.addEventListener('click',function(){ pickFile.click(); });
    pickFile.addEventListener('change',function(){
      if(pickFile.files&&pickFile.files[0]){
        var a=getAudio();
        a.src=URL.createObjectURL(pickFile.files[0]);
        a.play().then(function(){setPlaying(true);say('🎶 '+pickFile.files[0].name);}).catch(function(){});
      }
    });
  }
  window.addEventListener('load',function(){
    var a=document.getElementById('uwuBgm');
    if(a){ bind(a); if(hasSrc(a)) say('🎵 Música lista — toca 🎵'); if(!a.paused) setPlaying(true); }
  });
})();
</script>
<!-- ===== /UWU KIT ===== -->
__UWU_AUDIO__
<script>
/* UWU personalización — placeholders + ?para=&de=&msg=&code= */
(function(){
  var p=new URLSearchParams(location.search);
  var para=p.get('para')||'', de=p.get('de')||'';
  var msg=p.get('msg'), sub=p.get('subtitle'), code=p.get('code');
  function isPh(t){return !t||String(t).indexOf('__UWU_')===0;}
  function setText(el,val){ if(el&&val!=null&&val!=='') el.textContent=val; }
  var mEl=document.getElementById('uwuMsg');
  var sEl=document.getElementById('uwuSubtitle');
  var cEl=document.getElementById('uwuCode')||document.querySelector('.code');
  if(mEl){
    if(msg) setText(mEl,msg);
    else if(isPh(mEl.textContent)) setText(mEl,mEl.getAttribute('data-default')||mEl.textContent.replace(/__UWU_MSG__/g,'').trim()||'');
  }
  if(sEl){
    if(sub) setText(sEl,sub);
    else if(para||de) setText(sEl,('Para '+(para||'ti')+' — de '+(de||'alguien que te ama')));
    else if(isPh(sEl.textContent)) setText(sEl,sEl.getAttribute('data-default')||'');
  }
  if(cEl){
    if(code) setText(cEl,'Código: '+code);
    else if(isPh(cEl.textContent)) setText(cEl,'');
  }
  document.querySelectorAll('[data-uwu-msg]').forEach(function(el){
    if(msg) el.textContent=msg;
    else if(isPh(el.textContent)) el.textContent=el.getAttribute('data-default')||el.textContent;
  });
  document.querySelectorAll('[data-uwu-sub]').forEach(function(el){
    if(sub) el.textContent=sub;
    else if(para||de) el.textContent='Para '+(para||'ti')+' — de '+(de||'alguien que te ama');
  });
})();
</script>
</body>
</html>
