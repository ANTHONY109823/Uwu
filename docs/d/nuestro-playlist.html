<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>🎧 All of Me · Nuestro Playlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100svh;
            background: linear-gradient(145deg, #0d1a0f, #1a3a1f, #0f2a14);
            color: #f0f7f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Partículas animadas */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(29, 185, 84, 0.15);
            border-radius: 50%;
            animation: floatParticle 12s infinite alternate ease-in-out;
        }

        @keyframes floatParticle {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 0.1;
            }
            100% {
                transform: translate(40px, -60px) scale(1.2);
                opacity: 0.4;
            }
        }

        .wrap {
            max-width: 440px;
            width: 100%;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            padding: 36px 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(29, 185, 84, 0.15);
            position: relative;
            z-index: 1;
            transition: all 0.2s ease;
        }

        /* Línea brillante superior */
        .wrap::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 15%;
            right: 15%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #1DB954, #1ed760, #1DB954, transparent);
            border-radius: 100%;
            filter: blur(2px);
            opacity: 0.7;
        }

        .big {
            font-size: 68px;
            margin-bottom: 8px;
            filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.4));
            animation: pulse 3s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(1) rotate(-2deg);
                filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.4));
            }
            100% {
                transform: scale(1.04) rotate(2deg);
                filter: drop-shadow(0 8px 24px rgba(29, 185, 84, 0.3));
            }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #ffffff, #b3ffd6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(29, 185, 84, 0.15);
        }

        .sub {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 0.5px;
            color: #c0e6d0;
        }

        .msg {
            margin: 20px 0 18px;
            font-size: 1.05rem;
            line-height: 1.7;
            font-style: italic;
            min-height: 3.2em;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border-left: 2px solid #1DB954;
            border-right: 2px solid #1DB954;
            color: #e8f5ec;
            font-weight: 350;
            letter-spacing: 0.2px;
        }

        /* Reproductor mejorado */
        .player-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 12px 16px 12px 20px;
            margin: 16px 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            flex-wrap: wrap;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 400;
            color: #d4ecd6;
            flex: 1;
            min-width: 140px;
        }

        .track-info .icon {
            font-size: 1.6rem;
            line-height: 1;
        }

        .track-info .title {
            font-weight: 600;
            color: white;
            letter-spacing: -0.2px;
            font-size: 0.95rem;
        }

        .track-info .artist {
            opacity: 0.7;
            font-size: 0.75rem;
            display: block;
        }

        .player-card audio {
            width: 130px;
            height: 34px;
            border-radius: 40px;
            background: #1a2a1e;
            filter: invert(0.05) hue-rotate(120deg) brightness(1.1);
            flex-shrink: 0;
        }

        /* Botón principal */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            padding: 14px 30px;
            border-radius: 60px;
            background: linear-gradient(145deg, #1DB954, #1aa34a);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(29, 185, 84, 0.35);
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .pill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pill:hover::after {
            opacity: 1;
        }

        .pill:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 28px rgba(29, 185, 84, 0.5);
        }

        .pill:active {
            transform: scale(0.95);
        }

        .pill .heart {
            font-size: 1.3rem;
            line-height: 1;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .pill:hover .heart {
            transform: scale(1.3) rotate(-5deg);
        }

        .code {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: rgba(0, 0, 0, 0.25);
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(2px);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-sub {
            margin-top: 16px;
            font-size: 0.65rem;
            opacity: 0.35;
            letter-spacing: 0.5px;
            color: #b0d6ba;
        }

        @media (max-width: 480px) {
            .wrap {
                padding: 28px 16px 24px;
            }
            .big {
                font-size: 54px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .player-card {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 14px;
            }
            .player-card audio {
                width: 100%;
                max-width: 100%;
            }
            .track-info {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Partículas decorativas -->
    <div class="particles" id="particles"></div>

    <div class="wrap">
        <div class="big">🎧</div>
        <h1>Nuestra playlist</h1>
        <p class="sub" id="uwuSubtitle">__UWU_SUBTITLE__</p>
        <p class="msg" id="uwuMsg">__UWU_MSG__</p>

        <!-- Reproductor con All of Me - John Legend -->
        <div class="player-card">
            <div class="track-info">
                <span class="icon">🎵</span>
                <span>
                    <span class="title">All of Me</span>
                    <span class="artist">John Legend</span>
                </span>
            </div>
            <audio controls preload="metadata" id="audioPlayer">
                <source src="https://www.habbox.com/radio/all-of-me.mp3" type="audio/mpeg">
                <!-- Enlace alternativo si el anterior falla -->
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Tu navegador no soporta audio.
            </audio>
        </div>

        <button class="pill" type="button" id="loveBtn">
            <span class="heart">❤️</span> Escuchar juntos
        </button>

        <div class="code" id="uwuCode">__UWU_CODE__</div>
        <p class="footer-sub">Plantilla UWU-PLAY · Edita este HTML en el panel admin</p>
    </div>

    <script>
        (function() {
            // Parámetros URL
            const params = new URLSearchParams(location.search);
            const msg = params.get("msg") || "__UWU_MSG__";
            const sub = params.get("subtitle") || "__UWU_SUBTITLE__";
            const code = params.get("code") || "__UWU_CODE__";

            const msgEl = document.getElementById("uwuMsg");
            const subEl = document.getElementById("uwuSubtitle");
            const codeEl = document.getElementById("uwuCode");

            if (msg && msg !== "__UWU_MSG__") msgEl.textContent = msg;
            if (sub && sub !== "__UWU_SUBTITLE__") subEl.textContent = sub;
            if (code && code !== "__UWU_CODE__") codeEl.textContent = "Código: " + code;

            // Partículas
            (function createParticles() {
                const container = document.getElementById("particles");
                for (let i = 0; i < 18; i++) {
                    const p = document.createElement("div");
                    p.className = "particle";
                    const size = Math.random() * 12 + 4;
                    p.style.width = size + "px";
                    p.style.height = size + "px";
                    p.style.left = Math.random() * 100 + "%";
                    p.style.top = Math.random() * 100 + "%";
                    p.style.animationDuration = (Math.random() * 14 + 10) + "s";
                    p.style.animationDelay = (Math.random() * 8) + "s";
                    container.appendChild(p);
                }
            })();

            // Botón y audio
            const btn = document.getElementById("loveBtn");
            const heart = btn.querySelector(".heart");
            const audio = document.getElementById("audioPlayer");
            let isPlaying = false;

            // Función para actualizar el botón según estado
            function updateButton(playing) {
                if (playing) {
                    btn.innerHTML = '<span class="heart">💚</span> Reproduciendo';
                    heart.style.transform = "scale(1.2)";
                } else {
                    btn.innerHTML = '<span class="heart">❤️</span> Escuchar juntos';
                    heart.style.transform = "scale(1)";
                }
            }

            // Evento click del botón
            btn.addEventListener("click", function(e) {
                // Animación del corazón
                heart.style.transition = "transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)";
                heart.style.transform = "scale(1.8)";
                setTimeout(() => {
                    heart.style.transform = "scale(1)";
                }, 350);

                if (audio) {
                    if (audio.paused) {
                        audio.play().then(() => {
                            isPlaying = true;
                            updateButton(true);
                        }).catch(err => {
                            console.warn("Error al reproducir:", err);
                            // Si falla, mostramos mensaje pero no bloqueamos
                            btn.innerHTML = '<span class="heart">🎵</span> Intentando...';
                            setTimeout(() => updateButton(false), 1200);
                        });
                    } else {
                        audio.pause();
                        isPlaying = false;
                        updateButton(false);
                    }
                }
            });

            // Sincronizar estado cuando el audio termina
            if (audio) {
                audio.addEventListener("ended", function() {
                    isPlaying = false;
                    updateButton(false);
                });

                audio.addEventListener("pause", function() {
                    if (!audio.ended) {
                        isPlaying = false;
                        updateButton(false);
                    }
                });

                audio.addEventListener("play", function() {
                    isPlaying = true;
                    updateButton(true);
                });
            }

            // Si el código tiene placeholder, mostrar algo bonito
            if (codeEl.textContent.includes("__UWU_CODE__")) {
                codeEl.textContent = "♡ 2026 · para ti";
            }
        })();
    </script>
</body>
</html>
