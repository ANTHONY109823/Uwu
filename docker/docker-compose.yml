services:
  postgres:
    image: postgres:16-alpine
    container_name: uwu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: uwu
      POSTGRES_USER: uwu
      POSTGRES_PASSWORD: uwu_dev
    volumes:
      - uwu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uwu -d uwu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uwu_pgdata:
